name: Sync Backend to Hugging Face Space

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-huggingface.yml"
  workflow_dispatch:

jobs:
  sync-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest tests -q

      - name: Check Hugging Face secrets
        id: hf-secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          if [ -n "$HF_TOKEN" ] && [ -n "$HF_SPACE_REPO" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync backend folder to Hugging Face Space
        if: steps.hf-secrets.outputs.ready == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          git clone https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO} hf-space
          rsync -av --delete --exclude ".git" backend/ hf-space/

          cd hf-space
          git config user.name "23f2003700"
          git config user.email "23f2003700@ds.study.iitm.ac.in"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Sync backend from SE-Project ${GITHUB_SHA}"
            git push origin HEAD:main
          else
            echo "No backend changes to sync"
          fi

      - name: Skip sync (missing Hugging Face secrets)
        if: steps.hf-secrets.outputs.ready != 'true'
        run: |
          echo "Hugging Face sync skipped. Configure HF_TOKEN and HF_SPACE_REPO secrets."
